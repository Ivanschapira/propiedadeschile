name: Actualizar propiedades

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4

      - name: Correr scraper
        run: python scraper.py

      - name: Subir resultados
        run: |
          git config user.name "PropiedadesChile Bot"
          git config user.email "bot@propiedadeschile.cl"
          git add propiedades.json
          git diff --staged --quiet || git commit -m "Actualización $(date '+%d/%m/%Y %H:%M')"
          git push
