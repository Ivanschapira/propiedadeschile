name: Actualizar propiedades

on:
  schedule:
    # Corre cada 4 horas (gratis en GitHub)
    - cron: '0 */4 * * *'
  workflow_dispatch:  # Permite correrlo manualmente desde GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Descargar código
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4

      - name: Correr scraper
        run: python scraper.py

      - name: Subir resultados al sitio
        run: |
          git config user.name "PropiedadesChile Bot"
          git config user.email "bot@propiedadeschile.cl"
          git add propiedades.json
          git diff --staged --quiet || git commit -m "Actualización automática $(date '+%d/%m/%Y %H:%M')"
          git push
